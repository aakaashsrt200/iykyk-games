<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d0d1a" />
    <meta
      name="description"
      content="IYKYK Games — The ultimate card game arena. Poker, Blackjack, Teen Patti, Rummy and more."
    />
    <meta property="og:title" content="IYKYK Games" />
    <meta property="og:description" content="The ultimate card game arena." />
    <meta property="og:type" content="website" />
    <title>IYKYK Games</title>
    <!-- Non-blocking font load: preload then swap to stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@400;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <!-- Theme: apply before render to avoid flash -->
    <script>
      (function() {
        var t = localStorage.getItem('iykyk-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <!-- Instant dark background — shown before JS bundle executes -->
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background-color: #0d0d1a;
        color: #f0f0f5;
        font-family: Inter, 'Segoe UI', sans-serif;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }
      /* Skeleton loader shown while React mounts */
      #root:empty::after {
        content: '';
        display: block;
        width: 48px;
        height: 48px;
        border: 3px solid rgba(244,197,66,0.2);
        border-top-color: #f4c542;
        border-radius: 50%;
        margin: 45vh auto 0;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
