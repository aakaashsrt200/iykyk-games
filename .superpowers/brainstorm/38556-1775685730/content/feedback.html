<style>
  /* ── Page edge indicator ── */
  .demo-page {
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    background: #0d0d1a;
    overflow: hidden;
    transition: box-shadow 0.4s ease;
  }
  .demo-page.your-turn {
    box-shadow: inset 4px 0 0 #10b981, inset -4px 0 0 #10b981, inset 0 -4px 0 #10b981;
  }
  .demo-page.time-low {
    box-shadow: inset 4px 0 0 #f59e0b, inset -4px 0 0 #f59e0b, inset 0 -4px 0 #f59e0b;
  }
  .demo-page.urgent {
    box-shadow: inset 4px 0 0 #ef4444, inset -4px 0 0 #ef4444, inset 0 -4px 0 #ef4444;
    animation: urgent-pulse 0.6s ease-in-out infinite alternate;
  }
  .demo-page.waiting {
    box-shadow: inset 4px 0 0 rgba(255,255,255,0.06), inset -4px 0 0 rgba(255,255,255,0.06), inset 0 -4px 0 rgba(255,255,255,0.06);
  }
  @keyframes urgent-pulse {
    from { box-shadow: inset 4px 0 0 #ef4444, inset -4px 0 0 #ef4444, inset 0 -4px 0 #ef4444; }
    to   { box-shadow: inset 4px 0 0 #ff6b6b, inset -4px 0 0 #ff6b6b, inset 0 -4px 0 #ff6b6b, 0 0 20px rgba(239,68,68,0.2); }
  }

  /* ── Your-turn seat glow ── */
  .demo-seat {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px;
    display: inline-flex;
    flex-direction: column;
    gap: 8px;
    min-width: 140px;
    transition: all 0.3s ease;
    vertical-align: top;
    margin-right: 12px;
  }
  .demo-seat.active {
    border-color: rgba(34,197,94,0.55);
    background: rgba(34,197,94,0.07);
    box-shadow: 0 0 0 1px rgba(34,197,94,0.2), 0 0 24px rgba(34,197,94,0.18);
    animation: seat-pulse 2s ease-in-out infinite;
  }
  @keyframes seat-pulse {
    0%,100% { box-shadow: 0 0 0 1px rgba(34,197,94,0.2), 0 0 24px rgba(34,197,94,0.18); }
    50%      { box-shadow: 0 0 0 2px rgba(34,197,94,0.35), 0 0 40px rgba(34,197,94,0.28); }
  }
  .seat-name { font-size: 0.82rem; color: #e8eaf0; font-weight: 600; }
  .your-turn-badge {
    display: inline-block;
    background: rgba(34,197,94,0.15);
    color: #4ade80;
    border: 1px solid rgba(34,197,94,0.35);
    border-radius: 20px;
    font-size: 0.62rem;
    padding: 2px 8px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    animation: badge-blink 1.4s ease-in-out infinite;
  }
  @keyframes badge-blink { 0%,100%{opacity:1} 50%{opacity:0.55} }

  /* ── Result overlays ── */
  .result-overlay {
    border-radius: 14px;
    padding: 20px 28px;
    text-align: center;
    margin-bottom: 12px;
    animation: result-slide-in 0.35s cubic-bezier(0.34,1.42,0.64,1) both;
  }
  @keyframes result-slide-in {
    from { transform: translateY(-28px) scale(0.88); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .result-win {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.35);
    color: #4ade80;
  }
  .result-lose {
    background: rgba(230,57,70,0.1);
    border: 1px solid rgba(230,57,70,0.35);
    color: #f87171;
  }
  .result-blackjack {
    background: linear-gradient(135deg, rgba(244,197,66,0.15), rgba(244,197,66,0.05));
    border: 1px solid rgba(244,197,66,0.45);
    color: #f4c542;
    box-shadow: 0 0 32px rgba(244,197,66,0.18);
  }
  .result-push {
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.3);
    color: #a5b4fc;
  }
  .result-title { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.04em; margin: 0 0 4px; }
  .result-sub   { font-size: 0.82rem; opacity: 0.75; margin: 0; }

  /* ── Blackjack special ── */
  .bj-special {
    animation: bj-special 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes bj-special {
    0%   { transform: scale(0.6) rotate(-4deg); opacity: 0; }
    70%  { transform: scale(1.06) rotate(0.5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ── Controls ── */
  .demo-controls {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .demo-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #9ca3af; border-radius: 8px;
    padding: 6px 14px; font-size: 0.75rem;
    cursor: pointer; font-weight: 600;
    transition: all 0.15s;
  }
  .demo-btn:hover { background: rgba(255,255,255,0.1); color: #e8eaf0; }
  .demo-btn.active-btn { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(34,197,94,0.3); }

  .section-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.3); font-weight: 700; margin: 0 0 10px;
  }
</style>

<h2>Emotional Feedback & Turn Awareness</h2>
<p class="subtitle">Interactive demo — click the buttons to see each state.</p>

<!-- Page edge indicator demo -->
<div class="section-label">Page Edge Indicator (left, right & bottom border)</div>
<div class="demo-controls">
  <button class="demo-btn" onclick="setEdge('waiting')">Not your turn</button>
  <button class="demo-btn" onclick="setEdge('your-turn')">Your turn (safe)</button>
  <button class="demo-btn" onclick="setEdge('time-low')">Time running low</button>
  <button class="demo-btn" onclick="setEdge('urgent')">Urgent (red pulse)</button>
</div>
<div class="demo-page waiting" id="edge-demo">
  <div class="section-label" style="margin:0 0 12px;">Live game area</div>
  <div>
    <div class="demo-seat" id="seat-1">
      <span class="seat-name">Alice</span>
      <span style="font-size:0.72rem;color:#6b7280;">Waiting…</span>
    </div>
    <div class="demo-seat active" id="seat-2">
      <span class="seat-name">You <span class="your-turn-badge">Your Turn</span></span>
      <span style="font-size:0.72rem;color:#4ade80;">Hit or Stand</span>
    </div>
    <div class="demo-seat" id="seat-3">
      <span class="seat-name">Bob</span>
      <span style="font-size:0.72rem;color:#6b7280;">Waiting…</span>
    </div>
  </div>
</div>

<!-- Result overlays demo -->
<div class="section-label" style="margin-top:8px;">Result Overlays (slide in from top, auto-dismiss after 2s)</div>
<div class="demo-controls">
  <button class="demo-btn" onclick="showResult('win')">Win</button>
  <button class="demo-btn" onclick="showResult('blackjack')">Blackjack!</button>
  <button class="demo-btn" onclick="showResult('lose')">Lose</button>
  <button class="demo-btn" onclick="showResult('push')">Push</button>
</div>
<div id="result-slot" style="min-height:80px;"></div>

<script>
function setEdge(state) {
  const el = document.getElementById('edge-demo');
  el.className = 'demo-page ' + state;
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active-btn'));
  event.target.classList.add('active-btn');
}

let resultTimer = null;
function showResult(type) {
  const slot = document.getElementById('result-slot');
  if (resultTimer) clearTimeout(resultTimer);

  const configs = {
    win:       { cls:'result-win',       title:'✓ You Win!',    sub:'+$50',         extra:'' },
    blackjack: { cls:'result-blackjack', title:'♦ Blackjack!',  sub:'+$75 (3:2)',   extra:' bj-special' },
    lose:      { cls:'result-lose',      title:'✗ You Lose',    sub:'−$25',         extra:'' },
    push:      { cls:'result-push',      title:'= Push',        sub:'Bet returned', extra:'' },
  };
  const c = configs[type];
  slot.innerHTML = `
    <div class="result-overlay ${c.cls}${c.extra}">
      <p class="result-title">${c.title}</p>
      <p class="result-sub">${c.sub}</p>
    </div>`;

  resultTimer = setTimeout(() => {
    const el = slot.querySelector('.result-overlay');
    if (el) { el.style.transition='opacity 0.4s'; el.style.opacity='0'; }
    setTimeout(() => { slot.innerHTML = '<div style="min-height:80px"></div>'; }, 400);
  }, 2000);
}
</script>
